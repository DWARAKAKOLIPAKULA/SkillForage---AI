name: SkillForge AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: skillforge
          POSTGRES_PASSWORD: skillforge123
          POSTGRES_DB: skillforge_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies
        run: pip install -r requirements-core.txt

      - name: Run import test
        env:
          DATABASE_URL: postgresql+asyncpg://skillforge:skillforge123@localhost:5433/skillforge_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "import fastapi; import sqlalchemy; import celery; import redis; print('Core imports successful')"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t skillforge-ai:latest .

      - name: Build Celery Docker image
        run: docker build -f Dockerfile.celery -t skillforge-celery:latest .

      - name: Verify images built
        run: |
          docker images | grep skillforge
          echo "Docker images built successfully"