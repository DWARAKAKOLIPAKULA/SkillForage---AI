services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge123
      POSTGRES_DB: skillforge_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge -d skillforge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://skillforge:skillforge123@db:5432/skillforge_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./faiss_index:/app/faiss_index   # persist FAISS index

  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://skillforge:skillforge123@db:5432/skillforge_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./faiss_index:/app/faiss_index   # same FAISS index as API

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
      - celery

volumes:
  postgres_data:
  redis_data: